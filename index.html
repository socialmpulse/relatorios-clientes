<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios de Clientes — Pulse Social Media</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#FAF3EB; color:#0d333b; min-height:100vh; }
    header { background:#0d333b; color:#fff; padding:2.5rem 2rem; text-align:center; }
    header h1 { font-size:1.8rem; margin-bottom:.5rem; }
    header p { opacity:.7; font-size:1rem; }
    .container { max-width:800px; margin:2.5rem auto; padding:0 1rem; }
    h2 { font-size:1rem; text-transform:uppercase; letter-spacing:.1em; color:#7B5531; margin-bottom:1rem; margin-top:2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1rem; }
    .card { background:#fff; border-radius:14px; padding:1.5rem 1.8rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.07); text-decoration:none; color:#0d333b; transition:transform .2s,box-shadow .2s; }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
    .card .avatar { width:44px; height:44px; border-radius:50%; background:#0d333b; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:700; margin-right:1rem; flex-shrink:0; }
    .card .info { flex:1; }
    .card .handle { font-size:1.05rem; font-weight:600; }
    .card .name { font-size:.82rem; color:#7B5531; margin-top:.1rem; }
    .card .months { font-size:.78rem; color:#999; margin-top:.25rem; }
    .card .arrow { font-size:1.4rem; color:#ccc; }
    footer { text-align:center; padding:2.5rem; color:#bbb; font-size:.8rem; }
  </style>
</head>
<body>
  <header>
    <h1>📊 Relatórios de Clientes</h1>
    <p>Pulse Social Media — Performance mensal no Instagram</p>
  </header>
  <div class="container">
    <h2>Clientes</h2>
    <div class="grid">
      <a href="laira.lus/index.html" class="card">
        <div class="avatar">L</div>
        <div class="info">
          <div class="handle">@laira.lus</div>
          <div class="name">Laira | Social Media</div>
          <div class="months">Jan · Fev · Mar 2026</div>
        </div>
        <div class="arrow">→</div>
      </a>
      <a href="socialmedia_pulse/index.html" class="card">
        <div class="avatar">P</div>
        <div class="info">
          <div class="handle">@socialmedia_pulse</div>
          <div class="name">Social Media | Estratégia e Conteúdo</div>
          <div class="months">Jan · Fev · Mar 2026</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>
  <footer>Pulse Social Media © 2026</footer>
</body>
</html>
